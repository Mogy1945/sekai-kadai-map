<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>世界問題課題マップ — 日本編</title>
<meta name="description" content="日本が直面する社会課題を、実データに基づく深刻度スコアで可視化した課題マップ">
<style>
/* 世界問題課題マップ — light flat 2D (surface #eef2f7, パレットはdataviz検証済み light列) */
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
[hidden] { display: none !important; }

:root {
  --bg: #eef2f7;            /* 海 */
  --land: #ffffff;
  --land-line: #ccd7e4;
  --region: #dbe8f9;
  --region-line: #8fb1dd;
  --ink: #16202e;
  --ink-2: #45536b;
  --ink-3: #7a879c;
  --line: #e3e9f2;
  --card: #ffffff;
  --accent: #2a78d6;
  --intl: #b45309;          /* 国際共通課題 */
  --seq: #2a78d6;
  --seq-track: #e3eaf4;
  --shadow: 0 8px 28px rgba(15, 23, 42, 0.10), 0 1px 3px rgba(15, 23, 42, 0.06);
}

html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Sans", "Noto Sans JP", "Yu Gothic UI", sans-serif;
  overflow: hidden;
  overscroll-behavior: none;
}

#app { position: fixed; inset: 0; }
#stage { position: absolute; inset: 0; width: 100%; height: 100%; display: block; touch-action: none; }

/* --- 地図 --- */
#landG path { fill: var(--land); stroke: var(--land-line); stroke-width: 0.6; vector-effect: non-scaling-stroke; }
.regionland { fill: var(--region); stroke: var(--region-line); stroke-width: 1; vector-effect: non-scaling-stroke; }
.country-label {
  text-anchor: middle; fill: var(--ink-2); font-size: 12.5px; font-weight: 700; letter-spacing: 0.08em;
  paint-order: stroke; stroke: rgba(255, 255, 255, 0.92); stroke-width: 3.5px; stroke-linejoin: round;
  pointer-events: none;
}
#worldLabels { transition: opacity 0.3s; }
#app:not(.world) #worldLabels { opacity: 0; }

/* --- ノード --- */
.node { cursor: pointer; }
.node .core { stroke-width: 2; fill-opacity: 0.13; }
.node.sub .core { fill-opacity: 0.10; stroke-width: 1.5; }
.node.shared .ring { fill: none; stroke: var(--intl); stroke-width: 1.6; stroke-dasharray: 5 4; }
.node text { pointer-events: none; user-select: none; }
.node .emoji { text-anchor: middle; }
.node .label {
  text-anchor: middle; fill: var(--ink); font-weight: 700; font-size: 1em;
  paint-order: stroke; stroke: rgba(255, 255, 255, 0.92); stroke-width: 3.5px; stroke-linejoin: round;
}
.node.sub .label { fill: var(--ink-2); font-weight: 600; font-size: 0.78em; transition: opacity 0.3s; }
.node .score {
  text-anchor: middle; fill: var(--ink-3); font-weight: 600; font-size: 0.82em;
  paint-order: stroke; stroke: rgba(255, 255, 255, 0.92); stroke-width: 3px; stroke-linejoin: round;
}
#app:not(.zoomed) .node.sub .label { opacity: 0; }
#app.focus .node.sub.lit .label { opacity: 1; }
.node .label, .node .score { transition: opacity 0.3s; }
.node.lcull .label, .node.lcull .score { opacity: 0; }
#app.world .node text { opacity: 0; }
#app.world #edgeLayer { opacity: 0; }
#app.moving #stage { pointer-events: none; }

/* --- エッジ --- */
#edgeLayer { transition: opacity 0.45s; }
.edge-tree { stroke: rgba(22, 32, 46, 0.15); stroke-width: 1.4; }
.edge-link { stroke: #7d8fa9; stroke-width: 1.5; stroke-dasharray: 6 5; opacity: 0.45; }
.edge-intl { stroke: var(--intl); stroke-width: 2.2; stroke-dasharray: 10 6; opacity: 0.55; }
.ll-tree { stroke: rgba(22, 32, 46, 0.35); stroke-width: 1.4; }
.ll-link { stroke: #7d8fa9; stroke-width: 1.5; stroke-dasharray: 5 4; }
.ll-intl { stroke: var(--intl); stroke-width: 2; stroke-dasharray: 6 4; }

/* 選択時のフォーカス */
#app.focus .node { opacity: 0.14; transition: opacity 0.3s; }
#app.focus .node.lit { opacity: 1; }
#app.focus .edge-tree, #app.focus .edge-link, #app.focus .edge-intl { opacity: 0.06; transition: opacity 0.3s; }
#app.focus .edge-lit.edge-tree { opacity: 1; stroke: rgba(22, 32, 46, 0.4); }
#app.focus .edge-lit.edge-link { opacity: 0.9; }
#app.focus .edge-lit.edge-intl { opacity: 0.95; }
.node.selected .core { stroke-width: 3.5; }

/* --- イントロ --- */
#intro {
  position: absolute; left: 0; right: 0; bottom: max(7vh, env(safe-area-inset-bottom, 0px) + 40px);
  text-align: center; pointer-events: none; padding: 0 20px;
  transition: opacity 0.5s, transform 0.5s;
}
#app:not(.world) #intro { opacity: 0; transform: translateY(16px); visibility: hidden; }
#intro .kicker { letter-spacing: 0.42em; font-size: 11px; color: var(--accent); font-weight: 700; margin-bottom: 10px; }
#intro h1 { font-size: clamp(26px, 5.4vw, 42px); font-weight: 800; letter-spacing: 0.05em; }
#intro .sub { color: var(--ink-2); font-size: clamp(12px, 2.4vw, 15px); margin: 10px 0 20px; }
#intro .hint { color: var(--ink-3); font-size: 11.5px; margin-top: 14px; }
#introBtns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.enterBtn {
  pointer-events: auto; cursor: pointer;
  font: inherit; font-weight: 700; font-size: 14px; color: #fff;
  background: var(--accent);
  border: 1px solid rgba(22, 32, 46, 0.08); border-radius: 12px;
  padding: 11px 20px;
  box-shadow: 0 3px 12px rgba(42, 120, 214, 0.3);
  transition: transform 0.15s, background 0.15s;
}
.enterBtn:hover { transform: translateY(-1px); background: #2263b3; }

/* --- トップバー --- */
#topbar {
  position: absolute; top: 0; left: 0; right: 0;
  display: flex; align-items: center; gap: 12px;
  padding: calc(10px + env(safe-area-inset-top, 0px)) 14px 10px;
  background: linear-gradient(rgba(238, 242, 247, 0.95), rgba(238, 242, 247, 0));
  z-index: 20; pointer-events: none;
}
#topbar > * { pointer-events: auto; }
#topbar .titles { display: flex; flex-direction: column; line-height: 1.25; min-width: 0; flex: 1; }
#topbar .titles strong { font-size: 14.5px; letter-spacing: 0.03em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#topbar .titles span { font-size: 10.5px; color: var(--ink-3); white-space: nowrap; }
#topbar .actions { margin-left: auto; display: flex; gap: 8px; }
#topbar button {
  cursor: pointer; font: inherit; font-size: 12.5px; font-weight: 600; color: var(--ink-2);
  background: var(--card); border: 1px solid var(--line); border-radius: 10px;
  padding: 7px 12px; white-space: nowrap;
  box-shadow: 0 1px 4px rgba(15, 23, 42, 0.06);
}
#topbar button:hover { color: var(--ink); border-color: #c8d3e2; }

/* --- 凡例 --- */
#legend {
  position: absolute; left: 12px; bottom: max(12px, env(safe-area-inset-bottom, 0px));
  background: var(--card); border: 1px solid var(--line); border-radius: 12px;
  padding: 10px 12px; z-index: 15;
  box-shadow: var(--shadow);
  max-width: min(46vw, 250px);
}
#legendCats { display: flex; flex-wrap: wrap; gap: 5px 10px; margin-bottom: 8px; }
.lchip { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--ink-2); }
.lchip i { width: 9px; height: 9px; border-radius: 50%; flex: none; }
.legend-lines { display: flex; flex-wrap: wrap; gap: 5px 12px; border-top: 1px solid var(--line); padding-top: 7px; }
.ll { display: inline-flex; align-items: center; gap: 5px; font-size: 10.5px; color: var(--ink-3); }

/* --- ツールチップ --- */
#tooltip {
  position: absolute; z-index: 40; pointer-events: none;
  background: var(--card); border: 1px solid var(--line); border-radius: 10px;
  padding: 8px 11px; max-width: 240px;
  box-shadow: var(--shadow);
}
#tooltip .tt-name { font-size: 13px; font-weight: 700; }
#tooltip .tt-sub { font-size: 11px; color: var(--ink-2); margin-top: 2px; }
#tooltip .tt-score { font-size: 11px; color: var(--ink-3); margin-top: 3px; }

/* --- 隣国チップ --- */
.nchip {
  position: absolute; transform: translate(-50%, -50%); z-index: 18;
  cursor: pointer; font: inherit; font-size: 12px; font-weight: 700; color: var(--ink);
  background: var(--card); border: 1px solid var(--line); border-radius: 999px;
  padding: 8px 14px; white-space: nowrap;
  box-shadow: var(--shadow);
}
.nchip:hover { border-color: var(--accent); color: var(--accent); }

/* --- 詳細パネル --- */
#panel {
  position: absolute; top: calc(58px + env(safe-area-inset-top, 0px)); right: 12px; bottom: 12px;
  width: min(400px, calc(100vw - 24px));
  background: var(--card); border: 1px solid var(--line); border-radius: 16px;
  z-index: 30; overflow-y: auto; overscroll-behavior: contain;
  box-shadow: var(--shadow);
  padding: 18px 18px 22px;
  animation: panelin 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
}
@keyframes panelin { from { opacity: 0; transform: translateX(20px); } }
#panel .pclose {
  position: sticky; top: 0; float: right; cursor: pointer;
  font: inherit; font-size: 15px; line-height: 1; color: var(--ink-3);
  background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 6px 9px;
}
#panel .pclose:hover { color: var(--ink); }
#panel .phead { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 4px; }
#panel .pemoji { font-size: 34px; line-height: 1.15; }
#panel h2 { font-size: 19px; line-height: 1.3; letter-spacing: 0.01em; }
#panel .ptagline { color: var(--ink-2); font-size: 12.5px; margin-top: 3px; }
.catchip {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10.5px; font-weight: 700; color: var(--ink-2);
  border: 1px solid var(--line); border-radius: 999px; padding: 3px 9px; margin-top: 7px; margin-right: 5px;
}
.catchip i { width: 8px; height: 8px; border-radius: 50%; }
.intlchip { border-color: #ecc9a8; color: var(--intl); background: #fdf6ee; }

.scorebox { background: #f5f8fc; border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px; margin: 14px 0; }
.scorebox .shead { display: flex; align-items: baseline; gap: 8px; }
.scorebox .snum { font-size: 30px; font-weight: 800; }
.scorebox .slabel { font-size: 11px; color: var(--ink-3); }
.sbar { display: grid; grid-template-columns: 4.6em 1fr auto; align-items: center; gap: 8px; margin-top: 8px; }
.sbar .sname { font-size: 11px; color: var(--ink-2); }
.sbar .strack { height: 7px; background: var(--seq-track); border-radius: 4px; overflow: hidden; }
.sbar .sfill { height: 100%; background: var(--seq); border-radius: 4px; }
.sbar .sval { font-size: 10.5px; color: var(--ink-3); max-width: 11em; text-align: right; }
.scorebox .snote { font-size: 10px; color: var(--ink-3); margin-top: 9px; line-height: 1.5; }

#panel h3 { font-size: 12px; letter-spacing: 0.14em; color: var(--accent); margin: 18px 0 7px; font-weight: 700; }
#panel p.body { font-size: 13px; line-height: 1.75; color: var(--ink-2); }

.stat { display: flex; align-items: baseline; gap: 8px; padding: 7px 0; border-bottom: 1px solid #eef2f7; }
.stat .kv { min-width: 0; }
.stat .k { font-size: 11.5px; color: var(--ink-3); }
.stat .v { font-size: 14px; font-weight: 700; margin-top: 1px; }
.stat .v small { font-weight: 400; color: var(--ink-3); font-size: 10.5px; margin-left: 5px; }
.stat a { margin-left: auto; flex: none; font-size: 10.5px; color: var(--accent); text-decoration: none; border: 1px solid #bcd5f2; border-radius: 7px; padding: 3px 8px; }
.stat a:hover { background: #eaf2fc; }

.subgrid { display: flex; flex-direction: column; gap: 6px; }
.subitem {
  display: flex; align-items: center; gap: 9px; text-align: left; cursor: pointer;
  font: inherit; color: var(--ink); background: #f8fafd;
  border: 1px solid var(--line); border-radius: 10px; padding: 9px 11px;
}
.subitem:hover { border-color: #b9c9de; }
.subitem i { border-radius: 50%; flex: none; }
.subitem .sname { font-size: 12.5px; font-weight: 600; }
.subitem .sev { margin-left: auto; flex: none; font-size: 10px; color: var(--ink-3); letter-spacing: 0.1em; }
.relitem { display: flex; flex-direction: column; gap: 3px; align-items: flex-start; }
.relitem .rel { font-size: 10px; color: var(--ink-3); }
.relbadge { display: inline-block; font-size: 9.5px; font-weight: 700; color: var(--intl); background: #fdf6ee; border: 1px solid #ecc9a8; border-radius: 6px; padding: 1px 6px; margin-right: 6px; }
.cflag { font-size: 13px; margin-right: 4px; }
.pdisclaimer { font-size: 10px; color: var(--ink-3); line-height: 1.6; border-top: 1px solid var(--line); margin-top: 18px; padding-top: 10px; }
.pparent { font-size: 11px; color: var(--ink-3); margin-bottom: 6px; }
.pparent button { cursor: pointer; font: inherit; font-size: 11px; color: var(--accent); background: none; border: none; padding: 0; text-decoration: underline; }

/* --- モーダル --- */
#modalWrap { position: fixed; inset: 0; z-index: 60; display: flex; align-items: center; justify-content: center; padding: 18px; }
#modalBack { position: absolute; inset: 0; background: rgba(22, 32, 46, 0.35); }
#modal {
  position: relative; max-width: 640px; width: 100%; max-height: 82vh; overflow-y: auto; overscroll-behavior: contain;
  background: var(--card); border: 1px solid var(--line); border-radius: 16px;
  padding: 22px; box-shadow: 0 20px 60px rgba(15, 23, 42, 0.25);
  animation: panelin 0.22s cubic-bezier(0.2, 0.8, 0.2, 1);
}
#modal h2 { font-size: 17px; margin-bottom: 12px; }
#modal .mclose { position: absolute; top: 14px; right: 14px; cursor: pointer; font: inherit; color: var(--ink-3); background: none; border: 1px solid var(--line); border-radius: 8px; padding: 5px 9px; }
#modal p { font-size: 13px; line-height: 1.8; color: var(--ink-2); margin-bottom: 10px; }
#modal code { background: #f0f4f9; border-radius: 5px; padding: 1px 6px; font-size: 12px; }
#modal table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
#modal th { text-align: left; color: var(--ink-3); font-size: 10.5px; letter-spacing: 0.08em; padding: 6px 8px; border-bottom: 1px solid var(--line); white-space: nowrap; }
#modal td { padding: 8px; border-bottom: 1px solid #eef2f7; vertical-align: top; }
#modal td.num { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
#modal tr.trow { cursor: pointer; }
#modal tr.trow:hover td { background: #f5f8fc; }
#modal .tdot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 7px; }
#modal h2.mh2 { margin-top: 18px; }

/* --- スマホ --- */
@media (max-width: 720px) {
  #panel {
    top: auto; left: 10px; right: 10px;
    bottom: max(10px, env(safe-area-inset-bottom, 0px));
    width: auto; max-height: 58vh;
    animation-name: panelup;
  }
  @keyframes panelup { from { opacity: 0; transform: translateY(22px); } }
  #legend { padding: 7px 9px; max-width: 58vw; }
  #legendCats { margin-bottom: 5px; gap: 3px 8px; }
  .lchip { font-size: 10px; }
  .ll { font-size: 9.5px; }
  #topbar .titles span { display: none; }
}

@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; transition: none !important; }
}

</style>
</head>
<body>
<div id="app" class="world">
  <svg id="stage" aria-label="課題マップ">
    <defs id="defs"></defs>
    <g id="mapLayer">
      <g id="landG"></g>
      <g id="regionsG"></g>
    </g>
    <g id="worldLabels"></g>
    <g id="edgeLayer"></g>
    <g id="nodeLayer"></g>
  </svg>

  <div id="intro">
    <p class="kicker">WORLD ISSUE MAP</p>
    <h1>世界問題課題マップ</h1>
    <p class="sub">データで見る、いま各国が抱える課題の全体像</p>
    <div id="introBtns"></div>
    <p class="hint">● の大きさ＝深刻度スコア（影響人数 × 経済インパクト × 緊急度）</p>
  </div>

  <header id="topbar" hidden>
    <button id="backBtn" title="世界地図へ戻る">← 地球</button>
    <div class="titles">
      <strong id="regionTitle">課題マップ</strong>
      <span id="dataDate"></span>
    </div>
    <div class="actions">
      <button id="tableBtn">一覧</button>
      <button id="aboutBtn">大きさの根拠</button>
    </div>
  </header>

  <div id="legend" hidden>
    <div id="legendCats"></div>
    <div class="legend-lines">
      <span class="ll"><svg width="26" height="10"><line x1="1" y1="5" x2="25" y2="5" class="ll-tree"/></svg>親子課題</span>
      <span class="ll"><svg width="26" height="10"><line x1="1" y1="5" x2="25" y2="5" class="ll-link"/></svg>国内の関連</span>
      <span class="ll"><svg width="26" height="10"><line x1="1" y1="5" x2="25" y2="5" class="ll-intl"/></svg>国際共通課題</span>
    </div>
  </div>

  <div id="neighborChips" hidden></div>
  <aside id="panel" hidden aria-live="polite"></aside>
  <div id="tooltip" hidden></div>
  <div id="modalWrap" hidden>
    <div id="modalBack"></div>
    <div id="modal" role="dialog" aria-modal="true"></div>
  </div>
</div>

     "why_problem": "南海トラフ巨大地震（最大死者29.8万人・被害292兆円）と首都直下地震（最大死者約1.8万人・被害約83兆円）はいずれも30年以内の発生確率が最高ランクとされ、発生すれば人的・経済的損失が不可逆で国家の存立に関わる「国難級」となるため、発災前にしか実行できない事前防災が国を挙げた課題とされる。能登半島地震では災害関連死が直接死を上回り、避難生活の質の低さが命を奪う構造も顕在化した。一方で論点もあり、発生確率の科学的根拠には限界が指摘され2025年9月に2つの推計値の併記へ改められたほか、5年20兆円強の国土強靱化投資については、財政制約下での規模・優先順位や公共事業偏重への懸念と、被害292兆円に比べ安価な保険だとする推進論が併存する。",
     "future_outlook": "政府の地震調査委員会は2025年9月、南海トラフ地震の30年以内発生確率を「60〜90%程度以上」と「20〜50%」の併記に改めたが、いずれも高い確率であり切迫性は変わらないとしている。政府は2026〜2030年度の第1次国土強靱化実施中期計画（事業規模20兆円強、2025年6月閣議決定）を進めるとともに、2026年3月に防災庁設置法案を閣議決定し同年11月の防災庁発足を予定して「本気の事前防災」を掲げるが、耐震化・津波避難・避難所環境・担い手確保の遅れが解消されないまま発災すれば、人口減少・財政悪化と相まって国家の回復力そのものが損なわれる恐れがある。",

// 課題グラフ: 複合スコア計算・ノード/エッジ構築・力学シミュレーション (UI非依存・node直require可)
'use strict';

const GraphCore = (() => {
  const CATEGORIES = ['人口・社会', '経済・財政', '労働・雇用', '政治・制度', '安全保障・災害', '環境・エネルギー', '健康・教育'];
  // dataviz検証済みライトパレット (surface #eef2f7, 全項目PASS)
  const CAT_COLORS = ['#2a78d6', '#eda100', '#1baf7a', '#4a3aa7', '#e34948', '#008300', '#e87ba4'];

  const clamp01 = v => Math.max(0, Math.min(1, v));

  // 複合スコア: 影響人数(対数)40% + 経済インパクト(対数)35% + 緊急度25%
  // 対数スケール: 影響人数は1.2億人(全国民)、経済は年100兆円で飽和
  function computeScore(si) {
    const pop = clamp01(Math.log10(Math.max(1, si.affected_population_man)) / Math.log10(12000));
    const econ = clamp01(Math.log10(1 + Math.max(0, si.econ_impact_trillion_yen)) / Math.log10(101));
    const urg = clamp01((si.urgency - 1) / 4);
    const score = Math.round(100 * (0.40 * pop + 0.35 * econ + 0.25 * urg));
    return { score, pop, econ, urg };
  }

  // 面積が知覚量なので半径は√スコア比例
  const majorRadius = score => 26 + 34 * Math.sqrt(score / 100);
  const subRadius = sev => 9 + 2.2 * (Math.max(1, Math.min(5, sev)) - 1);

  // 決定的擬似乱数 (再現性のためMath.randomは使わない)
  function mulberry32(seed) {
    let a = seed >>> 0;
    return () => {
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  function hashCode(s) {
    let h = 0;
    for (let i = 0; i < s.length; i++) h = (Math.imul(h, 31) + s.charCodeAt(i)) | 0;
    return h >>> 0;
  }

  function buildGraph(data) {
    const nodes = [], edges = [], byId = new Map();
    const issues = data.issues;
    const n = issues.length;

    issues.forEach((issue, i) => {
      const { score, pop, econ, urg } = computeScore(issue.score_inputs);
      const catIndex = Math.max(0, CATEGORIES.indexOf(issue.category));
      const angle = (i / n) * Math.PI * 2 - Math.PI / 2;
      const node = {
        id: issue.id, type: 'major', issue, score,
        breakdown: { pop, econ, urg },
        catIndex, color: CAT_COLORS[catIndex],
        r: majorRadius(score),
        x: Math.cos(angle) * 380, y: Math.sin(angle) * 260,
        vx: 0, vy: 0, fx: null, fy: null,
      };
      nodes.push(node);
      byId.set(node.id, node);
    });

    issues.forEach((issue) => {
      const parent = byId.get(issue.id);
      const rnd = mulberry32(hashCode(issue.id));
      issue.sub_issues.forEach((sub, j) => {
        const a = (j / issue.sub_issues.length) * Math.PI * 2 + rnd() * 0.9;
        const dist = parent.r + 62 + rnd() * 26;
        const node = {
          id: sub.id, type: 'sub', sub, parentId: issue.id,
          catIndex: parent.catIndex, color: parent.color,
          r: subRadius(sub.severity),
          x: parent.x + Math.cos(a) * dist, y: parent.y + Math.sin(a) * dist,
          vx: 0, vy: 0, fx: null, fy: null,
        };
        nodes.push(node);
        byId.set(node.id, node);
        edges.push({ a: parent, b: node, kind: 'tree' });
      });
    });

    // 課題間リンク (双方向の重複を除去)
    const seen = new Set();
    issues.forEach((issue) => {
      (issue.links_to_other_issues || []).forEach((l) => {
        const t = byId.get(l.target_id);
        if (!t || l.target_id === issue.id) return;
        const key = [issue.id, l.target_id].sort().join('|');
        if (seen.has(key)) return;
        seen.add(key);
        edges.push({
          a: byId.get(issue.id), b: t, kind: 'link',
          relation: l.relation, description: l.description,
        });
      });
    });

    return { nodes, edges, byId };
  }

  // 世界ビュー用: 対象国上空のクラスタ配置 (マップ座標系・決定的)
  function clusterPositions(nodes, cx, cy, spread, seed) {
    const rnd = mulberry32(seed || 20260722);
    const sp = spread || 21;
    const pos = new Map();
    nodes.filter(nd => nd.type === 'major').forEach((nd) => {
      const a = rnd() * Math.PI * 2;
      const d = sp * 0.15 + Math.sqrt(rnd()) * sp;
      pos.set(nd.id, { x: cx + Math.cos(a) * d * 1.3, y: cy - sp * 0.2 + Math.sin(a) * d * 0.8 });
    });
    nodes.forEach((nd) => {
      if (nd.type !== 'sub') return;
      const p = pos.get(nd.parentId);
      const a = rnd() * Math.PI * 2;
      const d = sp * (0.07 + rnd() * 0.12);
      pos.set(nd.id, { x: p.x + Math.cos(a) * d, y: p.y + Math.sin(a) * d * 0.8 });
    });
    return pos;
  }

  function createSim(graph) {
    const { nodes, edges } = graph;
    let alpha = 1;

    function tick() {
      if (alpha < 0.003) return alpha;
      // 反発
      for (let i = 0; i < nodes.length; i++) {
        const a = nodes[i];
        for (let j = i + 1; j < nodes.length; j++) {
          const b = nodes[j];
          let dx = b.x - a.x, dy = b.y - a.y;
          let d2 = dx * dx + dy * dy;
          if (d2 < 1e-4) { dx = 0.1; dy = 0.1; d2 = 0.02; }
          const bothMajor = a.type === 'major' && b.type === 'major';
          const q = bothMajor ? 7400
            : (a.type === 'sub' && b.type === 'sub')
              ? (a.parentId === b.parentId ? 340 : 220)
              : 900;
          const f = Math.min(alpha * q / d2, 6);
          const d = Math.sqrt(d2);
          const fx = f * dx / d, fy = f * dy / d;
          a.vx -= fx; a.vy -= fy;
          b.vx += fx; b.vy += fy;
        }
      }
      // ばね
      for (const e of edges) {
        const rest = e.kind === 'tree' ? e.a.r + e.b.r + 44 : e.a.r + e.b.r + 200;
        const k = e.kind === 'tree' ? 0.085 : 0.007;
        let dx = e.b.x - e.a.x, dy = e.b.y - e.a.y;
        const d = Math.sqrt(dx * dx + dy * dy) || 0.01;
        const f = k * (d - rest) * alpha * 2;
        const fx = f * dx / d, fy = f * dy / d;
        e.a.vx += fx; e.a.vy += fy;
        e.b.vx -= fx; e.b.vy -= fy;
      }
      // 中心重力
      for (const nd of nodes) {
        const g = nd.type === 'major' ? 0.02 : 0.005;
        nd.vx -= nd.x * g * alpha;
        nd.vy -= nd.y * g * alpha;
      }
      // 速度適用
      for (const nd of nodes) {
        if (nd.fx != null) { nd.x = nd.fx; nd.y = nd.fy; nd.vx = 0; nd.vy = 0; continue; }
        nd.vx *= 0.82; nd.vy *= 0.82;
        const sp = Math.sqrt(nd.vx * nd.vx + nd.vy * nd.vy);
        if (sp > 14) { nd.vx *= 14 / sp; nd.vy *= 14 / sp; }
        nd.x += nd.vx;
        nd.y += nd.vy;
      }
      // 衝突解決 (重い方=半径大が動きにくい)
      for (let i = 0; i < nodes.length; i++) {
        const a = nodes[i];
        for (let j = i + 1; j < nodes.length; j++) {
          const b = nodes[j];
          const pad = (a.type === 'major' && b.type === 'major') ? 54 : 8;
          const min = a.r + b.r + pad;
          let dx = b.x - a.x, dy = b.y - a.y;
          let d = Math.sqrt(dx * dx + dy * dy);
          if (d < 1e-3) { dx = 0.5; dy = 0.5; d = 0.7; }
          if (d >= min) continue;
          const ma = a.r * a.r, mb = b.r * b.r;
          const shareA = a.fx != null ? 0 : mb / (ma + mb);
          const shareB = b.fx != null ? 0 : ma / (ma + mb);
          const push = (min - d) * 0.55;
          a.x -= dx / d * push * shareA;
          a.y -= dy / d * push * shareA;
          b.x += dx / d * push * shareB;
          b.y += dy / d * push * shareB;
        }
      }
      alpha *= 0.994;
      return alpha;
    }

    return {
      tick,
      get alpha() { return alpha; },
      reheat(v) { alpha = Math.max(alpha, v); },
      setAlpha(v) { alpha = v; },
      settle(nTicks) { for (let i = 0; i < nTicks; i++) tick(); },

    const bx0 = Math.min(e.a.sx, e.b.sx), bx1 = Math.max(e.a.sx, e.b.sx);
    const by0 = Math.min(e.a.sy, e.b.sy), by1 = Math.max(e.a.sy, e.b.sy);
    const vis = bx1 > -MARG && bx0 < vw + MARG && by1 > -MARG && by0 < vh + MARG;
    if (!vis && e._vis === false) return;
    if (e._vis !== vis) e.el.style.display = vis ? '' : 'none';
    e._vis = vis;
    const c = e._c || (e._c = {});
    wr(e.el, c, 'x1', 'x1', e.a.sx.toFixed(1));
    wr(e.el, c, 'y1', 'y1', e.a.sy.toFixed(1));
    wr(e.el, c, 'x2', 'x2', e.b.sx.toFixed(1));
    wr(e.el, c, 'y2', 'y2', e.b.sy.toFixed(1));
  }

  // ===== ラベル自動間引き (Googleマップ式: 優先度順に衝突しないものだけ表示) =====
  let declutterTick = 0;
  function declutterLabels() {
    const litSet = selected ? adj.get(selected.id) : null;
    const kept = [];
    const cand = [];
    const consider = (nd) => {
      if (nd.type === 'sub' && cam.k <= 1.02 && !(litSet && litSet.has(nd.id))) { nd.el.classList.remove('lcull'); return; }
      cand.push(nd);
    };
    for (const rn of regions) for (const nd of rn.graph.nodes) consider(nd);
    for (const nd of sharedNodes) consider(nd);
    cand.sort((a, b) => {
      const pa = (litSet && litSet.has(a.id) ? 1000 : 0) + (a.type === 'sub' ? a.sub.severity * 4 : a.score);
      const pb = (litSet && litSet.has(b.id) ? 1000 : 0) + (b.type === 'sub' ? b.sub.severity * 4 : b.score);
      return pb - pa;
    });
    for (const nd of cand) {
      const fs = 13 * clamp(cam.k, 0.8, 1) * (nd.type === 'sub' ? 0.78 : 1);
      const name = nd.type === 'sub' ? nd.sub.name : nd.issue.name;
      const w = name.length * fs + 12;
      const y0 = nd.sy + nd.r * cam.k + 4;
      const h = nd.type === 'sub' ? 16 : 36;
      const rect = { x0: nd.sx - w / 2, x1: nd.sx + w / 2, y0, y1: y0 + h };
      let hit = false;
      for (const r of kept) {
        if (rect.x0 < r.x1 && rect.x1 > r.x0 && rect.y0 < r.y1 && rect.y1 > r.y0) { hit = true; break; }
      }
      const force = litSet && litSet.has(nd.id);
      if (!hit || force) { kept.push(rect); nd.el.classList.remove('lcull'); }
      else nd.el.classList.add('lcull');
    }
  }

  // ===== ビュー遷移 =====
  function enterWeb(regionId) {
    const rn = regions.find(r => r.data.id === regionId) || regions[0];
    const fromWorld = mode === 'world';
    mode = 'web';
    transT = 1;
    app.classList.remove('world');
    topbar.hidden = false;
    legend.hidden = false;
    setUIRegion(rn);
    rn.sim.reheat(0.12);
    const f = regionFit(rn);
    cam.tcx = f.cx; cam.tcy = f.cy; cam.tk = f.k;
    if (fromWorld) { cam.cx = f.cx; cam.cy = f.cy; cam.k = f.k; } // 世界からはその国の真上で展開
  }
  function flyTo(regionId) {
    if (mode !== 'web') { enterWeb(regionId); return; }
    const rn = regions.find(r => r.data.id === regionId);
    if (!rn) return;
    clearSelection();
    setUIRegion(rn);
    rn.sim.reheat(0.1);
    startFlight(regionFit(rn)); // 連続空間をスライド飛行
  }
  function exitWeb() {
    if (mode === 'world') return;
    cancelFlight();
    clearSelection();
    closeModal();
    mode = 'world';
    transT = 0;
    app.classList.add('world');
    topbar.hidden = true;
    legend.hidden = true;
    chips.hidden = true;
    hideTooltip();
  }

  // ===== 選択 =====
  function setLit() {
    const litSet = selected ? adj.get(selected.id) : null;
    for (const [, nd] of byId) {
      nd.el.classList.toggle('lit', !!litSet && litSet.has(nd.id));
      nd.el.classList.toggle('selected', !!selected && nd.id === selected.id);
    }
    for (const rn of regions) for (const e of rn.graph.edges) {
      e.el.classList.toggle('edge-lit', !!selected && (e.a.id === selected.id || e.b.id === selected.id));
    }
  }
  function selectNode(id) {
    const nd = byId.get(id);
    if (!nd) return;
    const homeRegion = nd.regionRef || (nd.invRegions && nd.invRegions[0]) || curR;
    if (mode !== 'web') enterWeb(homeRegion.data.id);
    else if (nd.regionRef && nd.regionRef !== curR) setUIRegion(nd.regionRef);
    selected = nd;
    app.classList.add('focus');
    setLit();
    cancelFlight();
    const gx = nd.regionRef ? nd.regionRef.anchor.x + nd.x : nd.x;
    const gy = nd.regionRef ? nd.regionRef.anchor.y + nd.y : nd.y;
    if (isNarrow()) {
      cam.tcx = gx;
      cam.tcy = gy + (vh * 0.16) / cam.tk;
    } else {
      cam.tcx = gx + 190 / cam.tk;
      cam.tcy = gy;

    renderPanel(nd);
    panel.hidden = false;
    panel.scrollTop = 0;

  }

  // ===== パネル =====

  function sbar(name, ratio, val) {
    return '<div class="sbar"><span class="sname">' + esc(name) + '</span>'
      + '<span class="strack"><span class="sfill" style="width:' + Math.round(ratio * 100) + '%"></span></span>'
      + '<span class="sval">' + val + '</span></div>';
  }

  function renderSubPanel(nd) {
    const parent = byId.get(nd.parentId);
    const S2 = nd.sub;
    const siblings = parent.issue.sub_issues.filter(s => s.id !== S2.id);
    panel.innerHTML =
      '<button class="pclose" data-act="close" aria-label="閉じる">✕</button>'
      + '<div class="pparent">└ <button data-goto="' + esc(parent.id) + '">' + esc(parent.issue.emoji) + ' ' + esc(parent.issue.name) + '</button> の構成課題</div>'
      + '<div class="phead"><div>'
      + '<h2>' + esc(S2.name) + '</h2>' + catChip(nd.catIndex)
      + '</div></div>'
      + '<div class="scorebox"><div class="shead"><span class="snum" style="color:' + nd.color + ';font-size:22px">' + sevDots(S2.severity) + '</span><span class="slabel">深刻度 ' + esc(S2.severity) + ' / 5</span></div></div>'
      + '<h3>概要</h3><p class="body">' + esc(S2.description) + '</p>'
      + '<h3>キーデータ</h3>' + statRow(S2.key_stat)
      + (siblings.length ? '<h3>同じ親の課題</h3><div class="subgrid">'
        + siblings.map(s => '<button class="subitem" data-goto="' + esc(s.id) + '"><i style="background:' + nd.color + ';width:' + (7 + s.severity * 1.6) + 'px;height:' + (7 + s.severity * 1.6) + 'px"></i><span class="sname">' + esc(s.name) + '</span><span class="sev">' + sevDots(s.severity) + '</span></button>').join('')
        + '</div>' : '')
      + '<div class="pdisclaimer">出典に基づく要約。データ時点: ' + esc(D.generated) + '</div>';
  }

  panel.addEventListener('click', (e) => {
    const go = e.target.closest('[data-goto]');
    if (go) { selectNode(go.getAttribute('data-goto')); return; }
    if (e.target.closest('[data-act="close"]')) clearSelection();
  });

  // ===== ツールチップ =====
  let ttX = 0, ttY = 0;
  function positionTooltip() {
    const w = tooltip.offsetWidth || 180, h = tooltip.offsetHeight || 60;
    let x = ttX + 16, y = ttY + 14;
    if (x + w > vw - 8) x = ttX - w - 12;
    if (y + h > vh - 8) y = ttY - h - 12;
    tooltip.style.left = x + 'px';
    tooltip.style.top = y + 'px';
  }
  function showTooltip(nd) {
    ttNode = nd;
    tooltip.innerHTML = nd.type !== 'sub'
      ? '<div class="tt-name">' + esc(nd.issue.emoji) + ' ' + esc(nd.issue.name) + '</div><div class="tt-sub">' + esc(nd.issue.tagline) + '</div><div class="tt-score">' + (nd.type === 'shared' ? '🌐国際 ・ ' : '') + '深刻度 ' + nd.score + ' / 100 ・ タップで詳細</div>'
      : '<div class="tt-name">' + esc(nd.sub.name) + '</div><div class="tt-score">深刻度 ' + sevDots(nd.sub.severity) + ' ・ タップで詳細</div>';
    tooltip.hidden = false;
    positionTooltip();
  }
  function hideTooltip() { tooltip.hidden = true; ttNode = null; }

  svg.addEventListener('mousemove', (e) => {
    if (mode !== 'web' || dragState) return;
    ttX = e.clientX; ttY = e.clientY;
    const g = e.target.closest && e.target.closest('.node');
    if (g) {
      const nd = byId.get(g.getAttribute('data-id'));
      if (nd !== ttNode) showTooltip(nd);
      else positionTooltip();
    } else hideTooltip();
  });
  svg.addEventListener('mouseleave', hideTooltip);

  // ===== クリック =====
  function nearestRegionByScreen(sx, sy) {
    const mc = mapCamAt(easeIO(trans));
    let best = regions[0], bd = Infinity;
    for (const rn of regions) {
      const [x, y] = mapToScreen(mc, rn.map.center.x, rn.map.center.y);
      const d = Math.hypot(sx - x, sy - y);
      if (d < bd) { bd = d; best = rn; }
    }
    return best;
  }
  svg.addEventListener('click', (e) => {
    if (performance.now() < suppressClickUntil) return;
    if (mode === 'world') { enterWeb(nearestRegionByScreen(e.clientX, e.clientY).data.id); return; }
    const g = e.target.closest && e.target.closest('.node');
    if (g) selectNode(g.getAttribute('data-id'));
    else if (trans === 1) clearSelection();
  });
  nodeLayer.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter' && e.key !== ' ') return;
    const g = e.target.closest && e.target.closest('.node');
    if (g) { e.preventDefault(); selectNode(g.getAttribute('data-id')); }
  });

  // ===== ドラッグ / パン / ピンチ / ホイール =====
  let dragState = null;
  const pointers = new Map();
  let pinch = null;

  svg.addEventListener('pointerdown', (e) => {
    if (mode !== 'web' || trans < 1) return;
    cancelFlight();
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (pointers.size === 2) {
      const [p1, p2] = [...pointers.values()];
      pinch = { d: Math.hypot(p2.x - p1.x, p2.y - p1.y), k: cam.tk };
      dragState = null;
      return;
    }
    const g = e.target.closest && e.target.closest('.node');
    if (g) {
      dragState = { type: 'node', nd: byId.get(g.getAttribute('data-id')), moved: false, sx: e.clientX, sy: e.clientY };
    } else {
      dragState = { type: 'pan', sx: e.clientX, sy: e.clientY, cx: cam.tcx, cy: cam.tcy, moved: false };
    }
    if (svg.setPointerCapture) { try { svg.setPointerCapture(e.pointerId); } catch (_) { } }
  });

  svg.addEventListener('pointermove', (e) => {
    const p = pointers.get(e.pointerId);
    if (p) { p.x = e.clientX; p.y = e.clientY; }
    if (pinch && pointers.size === 2) {
      const [p1, p2] = [...pointers.values()];
      const d = Math.hypot(p2.x - p1.x, p2.y - p1.y);
      cam.tk = clamp(pinch.k * d / pinch.d, 0.22, 3);
      return;
    }
    if (!dragState) return;
    const dx = e.clientX - dragState.sx, dy = e.clientY - dragState.sy;
    if (!dragState.moved && Math.hypot(dx, dy) > 5) dragState.moved = true;
    if (!dragState.moved) return;
    hideTooltip();
    if (dragState.type === 'node') {
      const [nx, ny] = screenToNet(e.clientX, e.clientY);
      if (dragState.nd.regionRef) {
        dragState.nd.fx = nx - dragState.nd.regionRef.anchor.x;
        dragState.nd.fy = ny - dragState.nd.regionRef.anchor.y;
        dragState.nd.regionRef.sim.reheat(0.35);
      } else {
        dragState.nd.x = nx; // 国際共通課題は物理なしで直接移動
        dragState.nd.y = ny;
        needFinal = true;
      }
    } else {
      cam.tcx = dragState.cx - dx / cam.k;
      cam.tcy = dragState.cy - dy / cam.k;
      cam.cx = cam.tcx; cam.cy = cam.tcy;
    }
  });

  const endPointer = (e) => {
    pointers.delete(e.pointerId);
    if (pointers.size < 2) pinch = null;
    if (!dragState) return;
    const ds = dragState;
    dragState = null;
    if (ds.type === 'node' && ds.nd.regionRef) {
      ds.nd.fx = null;
      ds.nd.fy = null;
      ds.nd.regionRef.sim.reheat(0.18);
    }
    if (e.type !== 'pointerup') return;
    // pointer capture中はclickイベントのtargetがSVG全体に再ターゲットされる環境があるため、
    // タップ(=移動なしのpointerup)はここで自前判定し、後続のclickは時限抑止する
    suppressClickUntil = performance.now() + 350;
    if (!ds.moved) {
      if (ds.type === 'node') selectNode(ds.nd.id);
      else if (trans === 1) clearSelection();
    }
  };
  svg.addEventListener('pointerup', endPointer);
  svg.addEventListener('pointercancel', endPointer);

  svg.addEventListener('wheel', (e) => {
    if (mode !== 'web') return;
    e.preventDefault();
    cancelFlight();
    const k2 = clamp(cam.tk * Math.exp(-e.deltaY * 0.0016), 0.22, 3);
    const [nx, ny] = screenToNet(e.clientX, e.clientY);
    cam.tcx = nx - (e.clientX - vw / 2) / k2;
    cam.tcy = ny - (e.clientY - vh / 2) / k2;
    cam.tk = k2;
  }, { passive: false });

  // ===== 凡例 =====
  function buildLegend(rn) {
    const present = [...new Set(rn.graph.nodes.filter(n => n.type === 'major').map(n => n.catIndex))].sort((a, b) => a - b);
    $('legendCats').innerHTML = present.map(ci =>
      '<span class="lchip"><i style="background:' + G.CAT_COLORS[ci] + '"></i>' + esc(G.CATEGORIES[ci]) + '</span>').join('');
  }

  // ===== モーダル =====
  function openModal(html) { modal.innerHTML = '<button class="mclose" aria-label="閉じる">✕</button>' + html; modalWrap.hidden = false; }
  function closeModal() { modalWrap.hidden = true; }
  modalBack.addEventListener('click', closeModal);
  modal.addEventListener('click', (e) => {
    if (e.target.closest('.mclose')) { closeModal(); return; }
    const tr = e.target.closest('tr[data-goto]');
    if (tr) { closeModal(); selectNode(tr.getAttribute('data-goto')); }
  });

  $('aboutBtn').addEventListener('click', () => openModal(
    '<h2>円の大きさ = 深刻度スコアの算出方法</h2>'
    + '<p>スコアは各課題の出典データから<strong>機械的に</strong>算出しており、編集上の主観による順位付けではありません。国をまたいで同一基準(絶対量)で算出しているため、国どうしの比較もできます。</p>'
    + '<p><code>スコア = 40% × 影響人数 + 35% × 経済インパクト + 25% × 緊急度</code></p>'
    + '<p>・<strong>影響人数</strong>: 直接・間接に影響を受ける人数（対数スケール、1.2億人で飽和）<br>'
    + '・<strong>経済インパクト</strong>: 年間の経済損失・財政負担等の兆円換算（対数スケール、年100兆円で飽和）<br>'
    + '・<strong>緊急度</strong>: 今後5年での不可逆性を1〜5で評価（出典の将来推計に基づく）</p>'
    + '<p>対数スケールを使うのは、影響人数や金額が桁で異なる課題を同じ地図に載せるためです。各数値の根拠と出典は、課題をタップすると出る詳細パネルに記載しています。</p>'
    + '<p>掲載課題の選定は、各国の政府世論調査・省庁白書・国際機関の評価・主要シンクタンクの提言を横断して複数出典で挙がったものを採用しています。データ時点: ' + esc(D.generated) + '</p>'
  ));

  $('tableBtn').addEventListener('click', () => {
    const rn = curR;
    const majors = rn.graph.nodes.filter(n => n.type === 'major').sort((a, b) => b.score - a.score);
    openModal(
      '<h2>' + esc(rn.data.flag + ' ' + rn.data.name) + 'の課題一覧（スコア順）</h2>'
      + '<table><thead><tr><th>課題</th><th>スコア</th><th>影響人数</th><th>経済/年</th><th>緊急度</th></tr></thead><tbody>'
      + majors.map(nd => '<tr class="trow" data-goto="' + esc(nd.id) + '">'
        + '<td><span class="tdot" style="background:' + nd.color + '"></span>' + esc(nd.issue.emoji) + ' ' + esc(nd.issue.name) + '</td>'
        + '<td class="num"><strong>' + nd.score + '</strong></td>'
        + '<td class="num">' + fmtMan(nd.issue.score_inputs.affected_population_man) + '</td>'
        + '<td class="num">' + esc(nd.issue.score_inputs.econ_impact_trillion_yen) + '兆円</td>'
        + '<td class="num">' + esc(nd.issue.score_inputs.urgency) + '/5</td>'
        + '</tr>').join('')
      + '</tbody></table>'
      + (sharedNodes.length ? '<h2 class="mh2">🌐 国際共通課題</h2>'
        + '<table><thead><tr><th>課題</th><th>スコア</th><th>関与</th></tr></thead><tbody>'
        + sharedNodes.slice().sort((a, b) => b.score - a.score).map(sn => '<tr class="trow" data-goto="' + esc(sn.id) + '">'
          + '<td><span class="tdot" style="background:' + sn.color + '"></span>' + esc(sn.issue.emoji) + ' ' + esc(sn.issue.name) + '</td>'
          + '<td class="num"><strong>' + sn.score + '</strong></td>'
          + '<td>' + sn.invRegions.map(r => esc(r.data.flag)).join(' ') + '</td>'
          + '</tr>').join('')
        + '</tbody></table>' : '')
    );
  });

  $('backBtn').addEventListener('click', exitWeb);
  $('introBtns').innerHTML = D.regions.map(rd =>
    '<button class="enterBtn" data-region="' + esc(rd.id) + '">' + esc(rd.flag) + ' ' + esc(rd.name) + 'の課題マップ</button>').join('');
  $('introBtns').addEventListener('click', (e) => {
    const b = e.target.closest('.enterBtn');
    if (b) enterWeb(b.getAttribute('data-region'));
  });
  window.addEventListener('keydown', (e) => {
    if (e.key !== 'Escape') return;
    if (!modalWrap.hidden) closeModal();
    else if (selected) clearSelection();
    else if (mode === 'web') exitWeb();
  });

  window.addEventListener('resize', () => {
    vw = window.innerWidth; vh = window.innerHeight;
    needFinal = true;
    if (mode === 'web' && !selected) {
      const f = regionFit(curR);
      cam.tcx = f.cx; cam.tcy = f.cy; cam.tk = f.k;
    }
  });

  $('dataDate').textContent = 'データ時点 ' + D.generated + ' ・ 出典付き' + (D.placeholder ? ' ・ ⚠プレースホルダー' : '');

  // ===== 起動 =====
  requestAnimationFrame(frame);

  // e2e用フック
  window.__APP__ = {
    regions, byId, sharedNodes, intlEdges, selectNode, clearSelection, enterWeb, exitWeb, flyTo,
    state: () => ({ mode, trans, region: curR.data.id, selected: selected && selected.id }),
  };
})();

</script>
</body>
</html>
