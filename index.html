<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>世界問題課題マップ — 日本編</title>
<meta name="description" content="日本が直面する社会課題を、実データに基づく深刻度スコアで可視化した課題マップ">
<style>
/* 世界問題課題マップ — dark single-look (surface #0b1020, パレットはdataviz検証済み) */
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
[hidden] { display: none !important; }

:root {
  --bg: #0b1020;
  --ink: #f2f5fb;
  --ink-2: #b7c0d8;
  --ink-3: #8890a8;
  --line: rgba(255, 255, 255, 0.09);
  --glass: rgba(13, 19, 38, 0.88);
  --accent: #5b8cff;
  --seq: #3987e5;          /* 数量バーはsequential単色 */
  --seq-track: #1c2740;
}

html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Sans", "Noto Sans JP", "Yu Gothic UI", sans-serif;
  overflow: hidden;
  overscroll-behavior: none;
}

#app { position: fixed; inset: 0; }
#app::before { /* 宇宙のビネット */
  content: ""; position: absolute; inset: 0; pointer-events: none;
  background:
    radial-gradient(120% 90% at 50% 40%, rgba(37, 56, 110, 0.35) 0%, rgba(11, 16, 32, 0) 55%),
    radial-gradient(140% 120% at 50% 110%, rgba(5, 8, 18, 0.9) 0%, rgba(11, 16, 32, 0) 45%);
}

#stage { position: absolute; inset: 0; width: 100%; height: 100%; display: block; touch-action: none; }

/* --- 地図 --- */
#landG path { fill: #131b31; stroke: #24304f; stroke-width: 0.5; vector-effect: non-scaling-stroke; }
#japanG path { fill: #223459; stroke: #4c69a8; stroke-width: 0.8; vector-effect: non-scaling-stroke; }
#japanHalo ellipse { animation: jpulse 3.2s ease-in-out infinite; }
@keyframes jpulse { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }
#starLayer circle { fill: #cdd8f2; }

/* --- ノード --- */
.node { cursor: pointer; }
.node .halo { pointer-events: none; }
.node .core { stroke-width: 2; }
.node.major .core { fill-opacity: 0.16; }
.node.sub .core { fill-opacity: 0.22; stroke-width: 1.5; }
.node text { pointer-events: none; user-select: none; }
.node .emoji { text-anchor: middle; }
.node .label {
  text-anchor: middle; fill: var(--ink); font-weight: 700; font-size: 1em;
  paint-order: stroke; stroke: rgba(7, 10, 22, 0.85); stroke-width: 3px; stroke-linejoin: round;
}
.node.sub .label { font-size: 0.78em; }
.node .score { font-size: 0.82em; }
.node.sub .label { fill: var(--ink-2); font-weight: 600; transition: opacity 0.3s; }
#app:not(.zoomed) .node.sub .label { opacity: 0; }
#app.focus .node.sub.lit .label { opacity: 1; }
.node .score {
  text-anchor: middle; fill: var(--ink-2); font-weight: 600;
  paint-order: stroke; stroke: rgba(7, 10, 22, 0.85); stroke-width: 3px; stroke-linejoin: round;
}

/* 世界ビューではラベル・エッジ非表示、ノードはパルス */
#app.world .node text { opacity: 0; }
#app.world #edgeLayer { opacity: 0; }
#app.world .node .halo { animation: npulse 2.6s ease-in-out infinite; }
@keyframes npulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
#app.world .node { cursor: pointer; }
#app:not(.world) #japanHalo { display: none; }

/* 遷移中はイベント無効 */
#app.moving #stage { pointer-events: none; }

/* --- エッジ --- */
#edgeLayer { transition: opacity 0.45s; }
.edge-tree { stroke: rgba(255, 255, 255, 0.13); stroke-width: 1.4; }
.edge-link { stroke: #8ea6d8; stroke-width: 1.6; stroke-dasharray: 7 6; opacity: 0.4; animation: dashflow 22s linear infinite; }
@keyframes dashflow { to { stroke-dashoffset: -260; } }
.ll-tree { stroke: rgba(255, 255, 255, 0.4); stroke-width: 1.4; }
.ll-link { stroke: #8ea6d8; stroke-width: 1.6; stroke-dasharray: 5 4; }

/* 選択時のフォーカス */
#app.focus .node { opacity: 0.16; transition: opacity 0.3s; }
#app.focus .node.lit { opacity: 1; }
#app.focus .edge-tree, #app.focus .edge-link { opacity: 0.05; transition: opacity 0.3s; }
#app.focus .edge-lit.edge-tree { opacity: 1; stroke: rgba(255, 255, 255, 0.35); }
#app.focus .edge-lit.edge-link { opacity: 0.95; }
.node.selected .core { stroke-width: 3.5; filter: brightness(1.25); }

/* --- イントロ --- */
#intro {
  position: absolute; left: 0; right: 0; bottom: max(7vh, env(safe-area-inset-bottom, 0px) + 40px);
  text-align: center; pointer-events: none; padding: 0 20px;
  transition: opacity 0.5s, transform 0.5s;
}
#app:not(.world) #intro { opacity: 0; transform: translateY(16px); visibility: hidden; }
#intro .kicker { letter-spacing: 0.42em; font-size: 11px; color: var(--accent); font-weight: 700; margin-bottom: 10px; }
#intro h1 { font-size: clamp(26px, 5.4vw, 44px); font-weight: 800; letter-spacing: 0.06em; text-shadow: 0 4px 30px rgba(0, 0, 0, 0.6); }
#intro .sub { color: var(--ink-2); font-size: clamp(12px, 2.4vw, 15px); margin: 10px 0 22px; }
#intro .hint { color: var(--ink-3); font-size: 11.5px; margin-top: 16px; }
#enterBtn {
  pointer-events: auto; cursor: pointer;
  font: inherit; font-weight: 700; font-size: 15px; color: #fff;
  background: linear-gradient(135deg, #3466d6, #7a4fd8);
  border: 1px solid rgba(255, 255, 255, 0.22); border-radius: 999px;
  padding: 13px 34px;
  box-shadow: 0 6px 30px rgba(64, 96, 220, 0.45);
  transition: transform 0.15s, box-shadow 0.15s;
}
#enterBtn:hover { transform: translateY(-2px); box-shadow: 0 10px 36px rgba(64, 96, 220, 0.6); }

/* --- トップバー --- */
#topbar {
  position: absolute; top: 0; left: 0; right: 0;
  display: flex; align-items: center; gap: 12px;
  padding: calc(10px + env(safe-area-inset-top, 0px)) 14px 10px;
  background: linear-gradient(rgba(7, 10, 22, 0.85), rgba(7, 10, 22, 0));
  z-index: 20; pointer-events: none;
}
#topbar > * { pointer-events: auto; }
#topbar .titles { display: flex; flex-direction: column; line-height: 1.25; min-width: 0; flex: 1; }
#topbar .titles strong { font-size: 14.5px; letter-spacing: 0.04em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#topbar .titles span { font-size: 10.5px; color: var(--ink-3); white-space: nowrap; }
#topbar .actions { margin-left: auto; display: flex; gap: 8px; }
#topbar button, #panel .pbtn {
  cursor: pointer; font: inherit; font-size: 12.5px; font-weight: 600; color: var(--ink-2);
  background: rgba(20, 28, 52, 0.85); border: 1px solid var(--line); border-radius: 9px;
  padding: 7px 12px; white-space: nowrap;
}
#topbar button:hover { color: var(--ink); border-color: rgba(255, 255, 255, 0.25); }

/* --- 凡例 --- */
#legend {
  position: absolute; left: 12px; bottom: max(12px, env(safe-area-inset-bottom, 0px));
  background: var(--glass); border: 1px solid var(--line); border-radius: 12px;
  padding: 10px 12px; z-index: 15; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  max-width: min(46vw, 240px);
}
#legendCats { display: flex; flex-wrap: wrap; gap: 5px 10px; margin-bottom: 8px; }
.lchip { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--ink-2); }
.lchip i { width: 9px; height: 9px; border-radius: 50%; flex: none; }
.legend-lines { display: flex; gap: 12px; border-top: 1px solid var(--line); padding-top: 7px; }
.ll { display: inline-flex; align-items: center; gap: 5px; font-size: 10.5px; color: var(--ink-3); }

/* --- ツールチップ --- */
#tooltip {
  position: absolute; z-index: 40; pointer-events: none;
  background: var(--glass); border: 1px solid var(--line); border-radius: 10px;
  padding: 8px 11px; max-width: 240px;
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  box-shadow: 0 8px 26px rgba(0, 0, 0, 0.45);
}
#tooltip .tt-name { font-size: 13px; font-weight: 700; }
#tooltip .tt-sub { font-size: 11px; color: var(--ink-2); margin-top: 2px; }
#tooltip .tt-score { font-size: 11px; color: var(--ink-3); margin-top: 3px; }

/* --- 詳細パネル --- */
#panel {
  position: absolute; top: calc(58px + env(safe-area-inset-top, 0px)); right: 12px; bottom: 12px;
  width: min(400px, calc(100vw - 24px));
  background: var(--glass); border: 1px solid var(--line); border-radius: 16px;
  z-index: 30; overflow-y: auto; overscroll-behavior: contain;
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  box-shadow: 0 14px 50px rgba(0, 0, 0, 0.5);
  padding: 18px 18px 22px;
  animation: panelin 0.28s cubic-bezier(0.2, 0.8, 0.2, 1);
}
@keyframes panelin { from { opacity: 0; transform: translateX(24px); } }
#panel .pclose {
  position: sticky; top: 0; float: right; cursor: pointer;
  font: inherit; font-size: 16px; line-height: 1; color: var(--ink-3);
  background: rgba(20, 28, 52, 0.9); border: 1px solid var(--line); border-radius: 8px; padding: 6px 9px;
}
#panel .pclose:hover { color: var(--ink); }
#panel .phead { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 4px; }
#panel .pemoji { font-size: 34px; line-height: 1.15; }
#panel h2 { font-size: 19px; line-height: 1.3; letter-spacing: 0.02em; }
#panel .ptagline { color: var(--ink-2); font-size: 12.5px; margin-top: 3px; }
.catchip {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10.5px; font-weight: 700; color: var(--ink-2);
  border: 1px solid var(--line); border-radius: 999px; padding: 3px 9px; margin-top: 7px;
}
.catchip i { width: 8px; height: 8px; border-radius: 50%; }

.scorebox { background: rgba(10, 15, 30, 0.6); border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px; margin: 14px 0; }
.scorebox .shead { display: flex; align-items: baseline; gap: 8px; }
.scorebox .snum { font-size: 30px; font-weight: 800; }
.scorebox .slabel { font-size: 11px; color: var(--ink-3); }
.sbar { display: grid; grid-template-columns: 4.6em 1fr auto; align-items: center; gap: 8px; margin-top: 8px; }
.sbar .sname { font-size: 11px; color: var(--ink-2); }
.sbar .strack { height: 7px; background: var(--seq-track); border-radius: 4px; overflow: hidden; }
.sbar .sfill { height: 100%; background: var(--seq); border-radius: 4px; }
.sbar .sval { font-size: 10.5px; color: var(--ink-3); max-width: 11em; text-align: right; }
.scorebox .snote { font-size: 10px; color: var(--ink-3); margin-top: 9px; line-height: 1.5; }

#panel h3 { font-size: 12px; letter-spacing: 0.14em; color: var(--accent); margin: 18px 0 7px; font-weight: 700; }
#panel p.body { font-size: 13px; line-height: 1.75; color: var(--ink-2); }

.stat { display: flex; align-items: baseline; gap: 8px; padding: 7px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.06); }
.stat .kv { min-width: 0; }
.stat .k { font-size: 11.5px; color: var(--ink-3); }
.stat .v { font-size: 14px; font-weight: 700; margin-top: 1px; }
.stat .v small { font-weight: 400; color: var(--ink-3); font-size: 10.5px; margin-left: 5px; }
.stat a { margin-left: auto; flex: none; font-size: 10.5px; color: var(--accent); text-decoration: none; border: 1px solid rgba(91, 140, 255, 0.35); border-radius: 7px; padding: 3px 8px; }
.stat a:hover { background: rgba(91, 140, 255, 0.15); }

.subgrid { display: flex; flex-direction: column; gap: 6px; }
.subitem {
  display: flex; align-items: center; gap: 9px; text-align: left; cursor: pointer;
  font: inherit; color: var(--ink); background: rgba(20, 28, 52, 0.5);
  border: 1px solid var(--line); border-radius: 10px; padding: 9px 11px;
}
.subitem:hover { border-color: rgba(255, 255, 255, 0.25); }
.subitem i { border-radius: 50%; flex: none; }
.subitem .sname { font-size: 12.5px; font-weight: 600; }
.subitem .sev { margin-left: auto; flex: none; font-size: 10px; color: var(--ink-3); letter-spacing: 0.1em; }
.relitem { display: flex; flex-direction: column; gap: 3px; }
.relitem .rel { font-size: 10px; color: var(--ink-3); }
.relbadge { display: inline-block; font-size: 9.5px; font-weight: 700; color: #ffd9a0; background: rgba(201, 133, 0, 0.16); border: 1px solid rgba(201, 133, 0, 0.4); border-radius: 6px; padding: 1px 6px; margin-right: 6px; }
.pdisclaimer { font-size: 10px; color: var(--ink-3); line-height: 1.6; border-top: 1px solid var(--line); margin-top: 18px; padding-top: 10px; }
.pparent { font-size: 11px; color: var(--ink-3); margin-bottom: 6px; }
.pparent button { cursor: pointer; font: inherit; font-size: 11px; color: var(--accent); background: none; border: none; padding: 0; text-decoration: underline; }

/* --- モーダル --- */
#modalWrap { position: fixed; inset: 0; z-index: 60; display: flex; align-items: center; justify-content: center; padding: 18px; }
#modalBack { position: absolute; inset: 0; background: rgba(4, 6, 14, 0.7); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
#modal {
  position: relative; max-width: 640px; width: 100%; max-height: 82vh; overflow-y: auto; overscroll-behavior: contain;
  background: #0f1730; border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 16px;
  padding: 22px; box-shadow: 0 20px 70px rgba(0, 0, 0, 0.6);
  animation: panelin 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
}
#modal h2 { font-size: 17px; margin-bottom: 12px; }
#modal .mclose { position: absolute; top: 14px; right: 14px; cursor: pointer; font: inherit; color: var(--ink-3); background: none; border: 1px solid var(--line); border-radius: 8px; padding: 5px 9px; }
#modal p { font-size: 13px; line-height: 1.8; color: var(--ink-2); margin-bottom: 10px; }
#modal code { background: rgba(255, 255, 255, 0.08); border-radius: 5px; padding: 1px 6px; font-size: 12px; }
#modal table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
#modal th { text-align: left; color: var(--ink-3); font-size: 10.5px; letter-spacing: 0.08em; padding: 6px 8px; border-bottom: 1px solid var(--line); white-space: nowrap; }
#modal td { padding: 8px; border-bottom: 1px solid rgba(255, 255, 255, 0.06); vertical-align: top; }
#modal td.num { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
#modal tr.trow { cursor: pointer; }
#modal tr.trow:hover td { background: rgba(255, 255, 255, 0.04); }
#modal .tdot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 7px; }

/* --- スマホ --- */
@media (max-width: 720px) {
  #panel {
    top: auto; left: 10px; right: 10px;
    bottom: max(10px, env(safe-area-inset-bottom, 0px));
    width: auto; max-height: 58vh;
    animation-name: panelup;
  }
  @keyframes panelup { from { opacity: 0; transform: translateY(26px); } }
  #legend { padding: 7px 9px; max-width: 56vw; }
  #legendCats { margin-bottom: 5px; gap: 3px 8px; }
  .lchip { font-size: 10px; }
  .ll { font-size: 9.5px; }
  #topbar .titles span { display: none; }
}

@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; transition: none !important; }
}

</style>
</head>
<body>
<div id="app" class="world">
  <svg id="stage" aria-label="課題マップ">
    <defs id="defs"></defs>
    <g id="starLayer"></g>
    <g id="mapLayer">
      <g id="landG"></g>
      <g id="japanHalo"></g>
      <g id="japanG"></g>
    </g>
    <g id="edgeLayer"></g>
    <g id="nodeLayer"></g>
  </svg>

  <div id="intro">
    <p class="kicker">WORLD ISSUE MAP</p>
    <h1>世界問題課題マップ</h1>
    <p class="sub">日本編 — データで見る、いま日本が抱える課題の全体像</p>
    <button id="enterBtn">日本の課題マップを開く</button>
    <p class="hint">● の大きさ＝深刻度スコア（影響人数 × 経済インパクト × 緊急度）</p>
  </div>

  <header id="topbar" hidden>
    <button id="backBtn" title="世界地図へ戻る">← 地球</button>
    <div class="titles">
      <strong>日本の課題マップ</strong>
      <span id="dataDate"></span>
    </div>
    <div class="actions">
      <button id="tableBtn">一覧</button>
      <button id="aboutBtn">大きさの根拠</button>
    </div>
  </header>

  <div id="legend" hidden>
    <div id="legendCats"></div>
    <div class="legend-lines">
      <span class="ll"><svg width="26" height="10"><line x1="1" y1="5" x2="25" y2="5" class="ll-tree"/></svg>親子課題</span>
      <span class="ll"><svg width="26" height="10"><line x1="1" y1="5" x2="25" y2="5" class="ll-link"/></svg>課題間の関連</span>
    </div>
  </div>

  <aside id="panel" hidden aria-live="polite"></aside>
  <div id="tooltip" hidden></div>
  <div id="modalWrap" hidden>
    <div id="modalBack"></div>
    <div id="modal" role="dialog" aria-modal="true"></div>
  </div>
</div>

// 課題グラフ: 複合スコア計算・ノード/エッジ構築・力学シミュレーション (UI非依存・node直require可)
'use strict';

const GraphCore = (() => {
  const CATEGORIES = ['人口・社会', '経済・財政', '労働・雇用', '政治・制度', '安全保障・災害', '環境・エネルギー', '健康・教育'];
  // dataviz検証済みダークパレット (surface #0b1020, 全項目PASS)
  const CAT_COLORS = ['#3987e5', '#c98500', '#199e70', '#9085e9', '#e66767', '#008300', '#d55181'];

  const clamp01 = v => Math.max(0, Math.min(1, v));

  // 複合スコア: 影響人数(対数)40% + 経済インパクト(対数)35% + 緊急度25%
  // 対数スケール: 影響人数は1.2億人(全国民)、経済は年100兆円で飽和
  function computeScore(si) {
    const pop = clamp01(Math.log10(Math.max(1, si.affected_population_man)) / Math.log10(12000));
    const econ = clamp01(Math.log10(1 + Math.max(0, si.econ_impact_trillion_yen)) / Math.log10(101));
    const urg = clamp01((si.urgency - 1) / 4);
    const score = Math.round(100 * (0.40 * pop + 0.35 * econ + 0.25 * urg));
    return { score, pop, econ, urg };
  }

  // 面積が知覚量なので半径は√スコア比例
  const majorRadius = score => 26 + 34 * Math.sqrt(score / 100);
  const subRadius = sev => 9 + 2.2 * (Math.max(1, Math.min(5, sev)) - 1);

  // 決定的擬似乱数 (再現性のためMath.randomは使わない)
  function mulberry32(seed) {
    let a = seed >>> 0;
    return () => {
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  function hashCode(s) {
    let h = 0;
    for (let i = 0; i < s.length; i++) h = (Math.imul(h, 31) + s.charCodeAt(i)) | 0;
    return h >>> 0;
  }

  function buildGraph(data) {
    const nodes = [], edges = [], byId = new Map();
    const issues = data.issues;
    const n = issues.length;

    issues.forEach((issue, i) => {
      const { score, pop, econ, urg } = computeScore(issue.score_inputs);
      const catIndex = Math.max(0, CATEGORIES.indexOf(issue.category));
      const angle = (i / n) * Math.PI * 2 - Math.PI / 2;
      const node = {
        id: issue.id, type: 'major', issue, score,
        breakdown: { pop, econ, urg },
        catIndex, color: CAT_COLORS[catIndex],
        r: majorRadius(score),
        x: Math.cos(angle) * 380, y: Math.sin(angle) * 260,
        vx: 0, vy: 0, fx: null, fy: null,
      };
      nodes.push(node);
      byId.set(node.id, node);
    });

    issues.forEach((issue) => {
      const parent = byId.get(issue.id);
      const rnd = mulberry32(hashCode(issue.id));
      issue.sub_issues.forEach((sub, j) => {
        const a = (j / issue.sub_issues.length) * Math.PI * 2 + rnd() * 0.9;
        const dist = parent.r + 62 + rnd() * 26;
        const node = {
          id: sub.id, type: 'sub', sub, parentId: issue.id,
          catIndex: parent.catIndex, color: parent.color,
          r: subRadius(sub.severity),
          x: parent.x + Math.cos(a) * dist, y: parent.y + Math.sin(a) * dist,
          vx: 0, vy: 0, fx: null, fy: null,
        };
        nodes.push(node);
        byId.set(node.id, node);
        edges.push({ a: parent, b: node, kind: 'tree' });
      });
    });

    // 課題間リンク (双方向の重複を除去)
    const seen = new Set();
    issues.forEach((issue) => {
      (issue.links_to_other_issues || []).forEach((l) => {
        const t = byId.get(l.target_id);
        if (!t || l.target_id === issue.id) return;
        const key = [issue.id, l.target_id].sort().join('|');
        if (seen.has(key)) return;
        seen.add(key);
        edges.push({
          a: byId.get(issue.id), b: t, kind: 'link',
          relation: l.relation, description: l.description,
        });
      });
    });

    return { nodes, edges, byId };
  }

  // 世界ビュー用: 日本上空のクラスタ配置 (マップ座標系・決定的)
  function clusterPositions(nodes, cx, cy) {
    const rnd = mulberry32(20260722);
    const pos = new Map();
    nodes.filter(nd => nd.type === 'major').forEach((nd) => {
      const a = rnd() * Math.PI * 2;
      const d = 3 + Math.sqrt(rnd()) * 21;
      pos.set(nd.id, { x: cx + Math.cos(a) * d * 1.3, y: cy - 4 + Math.sin(a) * d * 0.8 });
    });
    nodes.forEach((nd) => {
      if (nd.type !== 'sub') return;
      const p = pos.get(nd.parentId);
      const a = rnd() * Math.PI * 2;
      const d = 1.5 + rnd() * 2.6;
      pos.set(nd.id, { x: p.x + Math.cos(a) * d, y: p.y + Math.sin(a) * d * 0.8 });
    });
    return pos;
  }

  function createSim(graph) {
    const { nodes, edges } = graph;
    let alpha = 1;

    function tick() {
      if (alpha < 0.003) return alpha;
      // 反発
      for (let i = 0; i < nodes.length; i++) {
        const a = nodes[i];
        for (let j = i + 1; j < nodes.length; j++) {
          const b = nodes[j];
          let dx = b.x - a.x, dy = b.y - a.y;
          let d2 = dx * dx + dy * dy;
          if (d2 < 1e-4) { dx = 0.1; dy = 0.1; d2 = 0.02; }
          const bothMajor = a.type === 'major' && b.type === 'major';
          const q = bothMajor ? 5600
            : (a.type === 'sub' && b.type === 'sub')
              ? (a.parentId === b.parentId ? 340 : 220)
              : 900;
          const f = Math.min(alpha * q / d2, 6);
          const d = Math.sqrt(d2);
          const fx = f * dx / d, fy = f * dy / d;
          a.vx -= fx; a.vy -= fy;
          b.vx += fx; b.vy += fy;
        }
      }
      // ばね
      for (const e of edges) {
        const rest = e.kind === 'tree' ? e.a.r + e.b.r + 44 : e.a.r + e.b.r + 200;
        const k = e.kind === 'tree' ? 0.085 : 0.007;
        let dx = e.b.x - e.a.x, dy = e.b.y - e.a.y;
        const d = Math.sqrt(dx * dx + dy * dy) || 0.01;
        const f = k * (d - rest) * alpha * 2;
        const fx = f * dx / d, fy = f * dy / d;
        e.a.vx += fx; e.a.vy += fy;
        e.b.vx -= fx; e.b.vy -= fy;
      }
      // 中心重力
      for (const nd of nodes) {
        const g = nd.type === 'major' ? 0.02 : 0.005;
        nd.vx -= nd.x * g * alpha;
        nd.vy -= nd.y * g * alpha;
      }
      // 速度適用
      for (const nd of nodes) {
        if (nd.fx != null) { nd.x = nd.fx; nd.y = nd.fy; nd.vx = 0; nd.vy = 0; continue; }
        nd.vx *= 0.82; nd.vy *= 0.82;
        const sp = Math.sqrt(nd.vx * nd.vx + nd.vy * nd.vy);
        if (sp > 14) { nd.vx *= 14 / sp; nd.vy *= 14 / sp; }
        nd.x += nd.vx;
        nd.y += nd.vy;
      }
      // 衝突解決 (重い方=半径大が動きにくい)
      for (let i = 0; i < nodes.length; i++) {
        const a = nodes[i];
        for (let j = i + 1; j < nodes.length; j++) {
          const b = nodes[j];
          const pad = (a.type === 'major' && b.type === 'major') ? 34 : 8;
          const min = a.r + b.r + pad;
          let dx = b.x - a.x, dy = b.y - a.y;
          let d = Math.sqrt(dx * dx + dy * dy);
          if (d < 1e-3) { dx = 0.5; dy = 0.5; d = 0.7; }
          if (d >= min) continue;
          const ma = a.r * a.r, mb = b.r * b.r;
          const shareA = a.fx != null ? 0 : mb / (ma + mb);
          const shareB = b.fx != null ? 0 : ma / (ma + mb);
          const push = (min - d) * 0.55;
          a.x -= dx / d * push * shareA;
          a.y -= dy / d * push * shareA;
          b.x += dx / d * push * shareB;
          b.y += dy / d * push * shareB;
        }
      }
      alpha *= 0.994;
      return alpha;
    }

    return {
      tick,
      get alpha() { return alpha; },
      reheat(v) { alpha = Math.max(alpha, v); },
      settle(nTicks) { for (let i = 0; i < nTicks; i++) tick(); },
    };
  }

  return { CATEGORIES, CAT_COLORS, computeScore, majorRadius, subRadius, buildGraph, clusterPositions, createSim, mulberry32, hashCode };
})();

if (typeof module !== 'undefined') module.exports = { GraphCore };

  const cam = { cx: 0, cy: 0, k: 1, tcx: 0, tcy: 0, tk: 1 };
  const worldCam = () => {
    const k = Math.min(vw / M.w, vh / M.h) * 0.96;
    return { cx: M.w / 2, cy: M.h / 2, k };
  };
  const japanCam = () => ({ cx: M.japanCenter.x, cy: M.japanCenter.y + 6, k: Math.min(vw, vh) / 34 });
  const mapCamAt = t => {
    const a = worldCam(), b = japanCam();
    return {
      cx: lerp(a.cx, b.cx, t), cy: lerp(a.cy, b.cy, t),
      k: Math.exp(lerp(Math.log(a.k), Math.log(b.k), t)),

  };
  const mapToScreen = (mc, x, y) => [vw / 2 + (x - mc.cx) * mc.k, vh / 2 + (y - mc.cy) * mc.k];
  const layoutToScreen = (x, y) => [vw / 2 + (x - cam.cx) * cam.k, vh / 2 + (y - cam.cy) * cam.k];
  const screenToLayout = (sx, sy) => [(sx - vw / 2) / cam.k + cam.cx, (sy - vh / 2) / cam.k + cam.cy];

  function fitGraph() {

  let suppressClick = false;
  let ttNode = null;

  // ===== フレームループ =====
  let lastNow = null;
  function frame(now) {
    const dt = lastNow == null ? 16 : Math.min(48, now - lastNow);
    lastNow = now;

    // 遷移
    if (trans !== transT) {
      const step = dt / 620;
      trans = transT > trans ? Math.min(transT, trans + step) : Math.max(transT, trans - step);
      app.classList.add('moving');
      if (trans === transT) app.classList.remove('moving');
    }
    const t = easeIO(trans);

    // 物理
    if (mode === 'web' && sim.alpha > 0.004) sim.tick();

    // グラフカメラ追従
    cam.cx = lerp(cam.cx, cam.tcx, 0.13);
    cam.cy = lerp(cam.cy, cam.tcy, 0.13);
    cam.k = lerp(cam.k, cam.tk, 0.13);

    // マップ
    const mc = mapCamAt(t);
    mapLayer.setAttribute('transform',
      'translate(' + (vw / 2 - mc.cx * mc.k).toFixed(2) + ' ' + (vh / 2 - mc.cy * mc.k).toFixed(2) + ') scale(' + mc.k.toFixed(4) + ')');
    mapLayer.style.opacity = String(1 - t * 0.9);

    // ノード位置 (world: 日本上空クラスタ / web: 力学レイアウト を補間)
    // ノード本体はカメラ倍率で拡縮 (セマンティックズーム)、ラベルは画面固定サイズ
    nodeLayer.style.fontSize = (13 * Math.max(0.8, Math.min(1, cam.k))).toFixed(1) + 'px';
    for (const nd of graph.nodes) {
      const cp = cluster.get(nd.id);
      const [wx, wy] = mapToScreen(mc, cp.x, cp.y);
      const [gx, gy] = layoutToScreen(nd.x, nd.y);
      const x = lerp(wx, gx, t), y = lerp(wy, gy, t);
      const worldR = nd.type === 'major' ? (2.6 + nd.score / 100 * 4.6) : 1.1;
      const s = lerp(worldR / nd.r, cam.k, t);
      nd.sx = x; nd.sy = y;
      nd.el.setAttribute('transform', 'translate(' + x.toFixed(1) + ' ' + y.toFixed(1) + ')');
      nd.gfxEl.setAttribute('transform', 'scale(' + s.toFixed(3) + ')');
      const edge = nd.r * s;
      nd.lbEl.setAttribute('y', (edge + (nd.type === 'major' ? 17 : 12)).toFixed(1));
      if (nd.scEl) nd.scEl.setAttribute('y', (edge + 31).toFixed(1));
    }
    for (const e of graph.edges) {
      e.el.setAttribute('x1', e.a.sx.toFixed(1)); e.el.setAttribute('y1', e.a.sy.toFixed(1));
      e.el.setAttribute('x2', e.b.sx.toFixed(1)); e.el.setAttribute('y2', e.b.sy.toFixed(1));
    }

    // ズーム段階でサブラベル表示
    app.classList.toggle('zoomed', cam.k > 1.02);

    // ツールチップ追従
    if (ttNode && !tooltip.hidden) positionTooltip();

    requestAnimationFrame(frame);
  }

  // ===== ビュー遷移 =====
  function enterWeb() {
    if (mode === 'web') return;
    mode = 'web';
    transT = 1;
    app.classList.remove('world');
    topbar.hidden = false;
    legend.hidden = false;
    sim.reheat(0.12);
    fitGraph();
  }
  function exitWeb() {
    if (mode === 'world') return;
    clearSelection();
    closeModal();
    mode = 'world';
    transT = 0;
    app.classList.add('world');
    topbar.hidden = true;
    legend.hidden = true;
    hideTooltip();
  }

  // ===== 選択 =====
  function setLit() {
    const litSet = selected ? adj.get(selected.id) : null;
    for (const nd of graph.nodes) nd.el.classList.toggle('lit', !!litSet && litSet.has(nd.id));
    for (const e of graph.edges) e.el.classList.toggle('edge-lit', !!selected && (e.a.id === selected.id || e.b.id === selected.id));
    for (const nd of graph.nodes) nd.el.classList.toggle('selected', !!selected && nd.id === selected.id);
  }
  function selectNode(id) {
    const nd = graph.byId.get(id);
    if (!nd) return;
    if (mode !== 'web') enterWeb();
    selected = nd;
    app.classList.add('focus');
    setLit();
    // パネルに隠れない位置へパン
    if (isNarrow()) {
      cam.tcx = nd.x;
      cam.tcy = nd.y + (vh * 0.16) / cam.tk;
    } else {
      cam.tcx = nd.x + 190 / cam.tk;
      cam.tcy = nd.y;
    }
    renderPanel(nd);
    panel.hidden = false;
    panel.scrollTop = 0;
    hideTooltip();
  }
  function clearSelection() {
    selected = null;
    app.classList.remove('focus');
    setLit();
    panel.hidden = true;
  }

  // ===== パネル =====
  const fmtMan = v => v >= 10000 ? (v / 10000).toFixed(v >= 100000 ? 0 : 1).replace(/\.0$/, '') + '億人' : Math.round(v).toLocaleString() + '万人';
  const catChip = ci => '<span class="catchip"><i style="background:' + G.CAT_COLORS[ci] + '"></i>' + esc(G.CATEGORIES[ci]) + '</span>';
  const statRow = st => {
    const u = safeUrl(st.source_url);
    return '<div class="stat"><div class="kv"><div class="k">' + esc(st.label) + '</div>'
      + '<div class="v">' + esc(st.value) + '<small>' + esc(st.year) + '年・' + esc(st.source_name) + '</small></div></div>'
      + (u ? '<a href="' + esc(u) + '" target="_blank" rel="noopener noreferrer">出典↗</a>' : '')
      + '</div>';
  };
  const sevDots = sev => '●'.repeat(Math.round(sev)) + '○'.repeat(5 - Math.round(sev));

  function renderPanel(nd) {
    if (nd.type === 'major') renderMajorPanel(nd);
    else renderSubPanel(nd);
  }

  function renderMajorPanel(nd) {
    const I = nd.issue, b = nd.breakdown, si = I.score_inputs;
    const conf = (D.meta && D.meta.confidences || []).find(c => c.id === I.id);
    const linkedEdges = graph.edges.filter(e => e.kind === 'link' && (e.a.id === nd.id || e.b.id === nd.id));
    panel.innerHTML =
      '<button class="pclose" data-act="close" aria-label="閉じる">✕</button>'
      + '<div class="phead"><div class="pemoji">' + esc(I.emoji) + '</div><div>'
      + '<h2>' + esc(I.name) + '</h2><div class="ptagline">' + esc(I.tagline) + '</div>' + catChip(nd.catIndex)
      + '</div></div>'
      + '<div class="scorebox">'
      + '<div class="shead"><span class="snum" style="color:' + nd.color + '">' + nd.score + '</span><span class="slabel">深刻度スコア /100 (円の大きさ)</span></div>'
      + sbar('影響人数', b.pop, fmtMan(si.affected_population_man))
      + sbar('経済', b.econ, '年約' + esc(si.econ_impact_trillion_yen) + '兆円')
      + sbar('緊急度', b.urg, esc(si.urgency) + ' / 5')
      + '<div class="snote">' + esc(si.affected_note) + ' / ' + esc(si.econ_note) + ' / ' + esc(si.urgency_rationale) + '</div>'
      + '</div>'
      + '<h3>現状</h3><p class="body">' + esc(I.overview) + '</p>'
      + '<h3>なぜ課題か</h3><p class="body">' + esc(I.why_problem) + '</p>'
      + '<h3>これから</h3><p class="body">' + esc(I.future_outlook) + '</p>'
      + '<h3>主要データ</h3>' + I.key_stats.map(statRow).join('')
      + '<h3>構成する課題 (' + I.sub_issues.length + ')</h3><div class="subgrid">'
      + I.sub_issues.map(s => {
        const sn = graph.byId.get(s.id);
        return '<button class="subitem" data-goto="' + esc(s.id) + '"><i style="background:' + nd.color + ';width:' + (7 + s.severity * 1.6) + 'px;height:' + (7 + s.severity * 1.6) + 'px"></i>'
          + '<span class="sname">' + esc(s.name) + '</span><span class="sev">' + sevDots(s.severity) + '</span></button>';
      }).join('') + '</div>'
      + (linkedEdges.length ? '<h3>つながる課題</h3><div class="subgrid">'
        + linkedEdges.map(e => {
          const other = e.a.id === nd.id ? e.b : e.a;
          return '<button class="subitem relitem" data-goto="' + esc(other.id) + '"><span><span class="relbadge">' + esc(e.relation) + '</span>'
            + '<span class="sname">' + esc(other.issue.emoji) + ' ' + esc(other.issue.name) + '</span></span>'
            + '<span class="rel">' + esc(e.description) + '</span></button>';
        }).join('') + '</div>' : '')
      + '<div class="pdisclaimer">公的統計・調査等の出典に基づく要約であり、特定の政治的立場を支持するものではありません。スコアは出典データからの機械的算出です（「大きさの根拠」参照）。'
      + (conf && conf.confidence === 'low' ? '<br>⚠ この課題の一部数値は推計・要再確認です。' : '')
      + '<br>データ時点: ' + esc(D.generated) + '</div>';
  }

  function sbar(name, ratio, val) {
    return '<div class="sbar"><span class="sname">' + esc(name) + '</span>'
      + '<span class="strack"><span class="sfill" style="width:' + Math.round(ratio * 100) + '%"></span></span>'
      + '<span class="sval">' + val + '</span></div>';
  }

  function renderSubPanel(nd) {
    const parent = graph.byId.get(nd.parentId);
    const S = nd.sub;
    const siblings = parent.issue.sub_issues.filter(s => s.id !== S.id);
    panel.innerHTML =
      '<button class="pclose" data-act="close" aria-label="閉じる">✕</button>'
      + '<div class="pparent">└ <button data-goto="' + esc(parent.id) + '">' + esc(parent.issue.emoji) + ' ' + esc(parent.issue.name) + '</button> の構成課題</div>'
      + '<div class="phead"><div>'
      + '<h2>' + esc(S.name) + '</h2>' + catChip(nd.catIndex)
      + '</div></div>'
      + '<div class="scorebox"><div class="shead"><span class="snum" style="color:' + nd.color + ';font-size:22px">' + sevDots(S.severity) + '</span><span class="slabel">深刻度 ' + esc(S.severity) + ' / 5</span></div></div>'
      + '<h3>概要</h3><p class="body">' + esc(S.description) + '</p>'
      + '<h3>キーデータ</h3>' + statRow(S.key_stat)
      + (siblings.length ? '<h3>同じ親の課題</h3><div class="subgrid">'
        + siblings.map(s => '<button class="subitem" data-goto="' + esc(s.id) + '"><i style="background:' + nd.color + ';width:' + (7 + s.severity * 1.6) + 'px;height:' + (7 + s.severity * 1.6) + 'px"></i><span class="sname">' + esc(s.name) + '</span><span class="sev">' + sevDots(s.severity) + '</span></button>').join('')
        + '</div>' : '')
      + '<div class="pdisclaimer">出典に基づく要約。データ時点: ' + esc(D.generated) + '</div>';
  }

  panel.addEventListener('click', (e) => {
    const go = e.target.closest('[data-goto]');
    if (go) { selectNode(go.getAttribute('data-goto')); return; }
    if (e.target.closest('[data-act="close"]')) clearSelection();
  });

  // ===== ツールチップ =====
  let ttX = 0, ttY = 0;
  function positionTooltip() {
    const w = tooltip.offsetWidth || 180, h = tooltip.offsetHeight || 60;
    let x = ttX + 16, y = ttY + 14;
    if (x + w > vw - 8) x = ttX - w - 12;
    if (y + h > vh - 8) y = ttY - h - 12;
    tooltip.style.left = x + 'px';
    tooltip.style.top = y + 'px';
  }
  function showTooltip(nd) {
    ttNode = nd;
    tooltip.innerHTML = nd.type === 'major'
      ? '<div class="tt-name">' + esc(nd.issue.emoji) + ' ' + esc(nd.issue.name) + '</div><div class="tt-sub">' + esc(nd.issue.tagline) + '</div><div class="tt-score">深刻度 ' + nd.score + ' / 100 ・ タップで詳細</div>'
      : '<div class="tt-name">' + esc(nd.sub.name) + '</div><div class="tt-score">深刻度 ' + sevDots(nd.sub.severity) + ' ・ タップで詳細</div>';
    tooltip.hidden = false;
    positionTooltip();
  }
  function hideTooltip() { tooltip.hidden = true; ttNode = null; }

  svg.addEventListener('mousemove', (e) => {
    if (mode !== 'web' || dragState) { return; }
    ttX = e.clientX; ttY = e.clientY;
    const g = e.target.closest && e.target.closest('.node');
    if (g) {
      const nd = graph.byId.get(g.getAttribute('data-id'));
      if (nd !== ttNode) showTooltip(nd);
      else positionTooltip();
    } else hideTooltip();
  });
  svg.addEventListener('mouseleave', hideTooltip);

  // ===== クリック =====
  svg.addEventListener('click', (e) => {
    if (suppressClick) { suppressClick = false; return; }
    if (mode === 'world') { enterWeb(); return; }
    const g = e.target.closest && e.target.closest('.node');
    if (g) selectNode(g.getAttribute('data-id'));
    else if (trans === 1) clearSelection();
  });
  nodeLayer.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter' && e.key !== ' ') return;
    const g = e.target.closest && e.target.closest('.node');
    if (g) { e.preventDefault(); selectNode(g.getAttribute('data-id')); }
  });

  // ===== ドラッグ / パン / ピンチ / ホイール =====
  let dragState = null;
  const pointers = new Map();
  let pinch = null;

  svg.addEventListener('pointerdown', (e) => {
    if (mode !== 'web' || trans < 1) return;
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (pointers.size === 2) {
      const [p1, p2] = [...pointers.values()];
      pinch = { d: Math.hypot(p2.x - p1.x, p2.y - p1.y), k: cam.tk };
      dragState = null;
      return;
    }
    const g = e.target.closest && e.target.closest('.node');
    if (g) {
      const nd = graph.byId.get(g.getAttribute('data-id'));
      dragState = { type: 'node', nd, moved: false, sx: e.clientX, sy: e.clientY };
    } else {
      dragState = { type: 'pan', sx: e.clientX, sy: e.clientY, cx: cam.tcx, cy: cam.tcy, moved: false };
    }
    if (svg.setPointerCapture) { try { svg.setPointerCapture(e.pointerId); } catch (_) { } }
  });

  svg.addEventListener('pointermove', (e) => {
    const p = pointers.get(e.pointerId);
    if (p) { p.x = e.clientX; p.y = e.clientY; }
    if (pinch && pointers.size === 2) {
      const [p1, p2] = [...pointers.values()];
      const d = Math.hypot(p2.x - p1.x, p2.y - p1.y);
      cam.tk = Math.max(0.25, Math.min(3, pinch.k * d / pinch.d));
      return;
    }
    if (!dragState) return;
    const dx = e.clientX - dragState.sx, dy = e.clientY - dragState.sy;
    if (!dragState.moved && Math.hypot(dx, dy) > 5) dragState.moved = true;
    if (!dragState.moved) return;
    hideTooltip();
    if (dragState.type === 'node') {
      const [lx, ly] = screenToLayout(e.clientX, e.clientY);
      dragState.nd.fx = lx;
      dragState.nd.fy = ly;
      sim.reheat(0.35);
    } else {
      cam.tcx = dragState.cx - dx / cam.k;
      cam.tcy = dragState.cy - dy / cam.k;
      cam.cx = cam.tcx; cam.cy = cam.tcy;
    }
  });

  const endPointer = (e) => {
    pointers.delete(e.pointerId);
    if (pointers.size < 2) pinch = null;
    if (!dragState) return;
    if (dragState.type === 'node') {
      dragState.nd.fx = null;
      dragState.nd.fy = null;
      sim.reheat(0.18);
    }
    if (dragState.moved) suppressClick = true;
    dragState = null;
  };
  svg.addEventListener('pointerup', endPointer);
  svg.addEventListener('pointercancel', endPointer);

  svg.addEventListener('wheel', (e) => {
    if (mode !== 'web') return;
    e.preventDefault();
    const k2 = Math.max(0.25, Math.min(3, cam.tk * Math.exp(-e.deltaY * 0.0016)));
    // カーソル位置を固定点にズーム
    const [lx, ly] = screenToLayout(e.clientX, e.clientY);
    cam.tcx = lx - (e.clientX - vw / 2) / k2;
    cam.tcy = ly - (e.clientY - vh / 2) / k2;
    cam.tk = k2;
  }, { passive: false });

  // ===== 凡例 =====
  function buildLegend() {
    const present = [...new Set(graph.nodes.filter(n => n.type === 'major').map(n => n.catIndex))].sort((a, b) => a - b);
    $('legendCats').innerHTML = present.map(ci =>
      '<span class="lchip"><i style="background:' + G.CAT_COLORS[ci] + '"></i>' + esc(G.CATEGORIES[ci]) + '</span>').join('');
  }

  // ===== モーダル =====
  function openModal(html) { modal.innerHTML = '<button class="mclose" aria-label="閉じる">✕</button>' + html; modalWrap.hidden = false; }
  function closeModal() { modalWrap.hidden = true; }
  modalBack.addEventListener('click', closeModal);
  modal.addEventListener('click', (e) => {
    if (e.target.closest('.mclose')) { closeModal(); return; }
    const tr = e.target.closest('tr[data-goto]');
    if (tr) { closeModal(); selectNode(tr.getAttribute('data-goto')); }
  });

  $('aboutBtn').addEventListener('click', () => openModal(
    '<h2>円の大きさ = 深刻度スコアの算出方法</h2>'
    + '<p>スコアは各課題の出典データから<strong>機械的に</strong>算出しており、編集上の主観による順位付けではありません。</p>'
    + '<p><code>スコア = 40% × 影響人数 + 35% × 経済インパクト + 25% × 緊急度</code></p>'
    + '<p>・<strong>影響人数</strong>: 直接・間接に影響を受ける人数（対数スケール、1.2億人=全国民で飽和）<br>'
    + '・<strong>経済インパクト</strong>: 年間の経済損失・財政負担等の兆円換算（対数スケール、年100兆円で飽和）<br>'
    + '・<strong>緊急度</strong>: 今後5年での不可逆性を1〜5で評価（出典の将来推計に基づく）</p>'
    + '<p>対数スケールを使うのは、影響人数や金額が桁で異なる課題を同じ地図に載せるためです。各数値の根拠と出典は、課題をタップすると出る詳細パネルに記載しています。</p>'
    + '<p>掲載課題の選定は、政府世論調査・省庁白書・国際機関の対日評価・主要シンクタンクの提言を横断して複数出典で挙がったものを採用しています。データ時点: ' + esc(D.generated) + '</p>'
  ));

  $('tableBtn').addEventListener('click', () => {
    const majors = graph.nodes.filter(n => n.type === 'major').sort((a, b) => b.score - a.score);
    openModal(
      '<h2>課題一覧（スコア順）</h2>'
      + '<table><thead><tr><th>課題</th><th>スコア</th><th>影響人数</th><th>経済/年</th><th>緊急度</th></tr></thead><tbody>'
      + majors.map(nd => '<tr class="trow" data-goto="' + esc(nd.id) + '">'
        + '<td><span class="tdot" style="background:' + nd.color + '"></span>' + esc(nd.issue.emoji) + ' ' + esc(nd.issue.name) + '</td>'
        + '<td class="num"><strong>' + nd.score + '</strong></td>'
        + '<td class="num">' + fmtMan(nd.issue.score_inputs.affected_population_man) + '</td>'
        + '<td class="num">' + esc(nd.issue.score_inputs.econ_impact_trillion_yen) + '兆円</td>'
        + '<td class="num">' + esc(nd.issue.score_inputs.urgency) + '/5</td>'
        + '</tr>').join('')
      + '</tbody></table>'
    );
  });

  $('backBtn').addEventListener('click', exitWeb);
  $('enterBtn').addEventListener('click', enterWeb);
  window.addEventListener('keydown', (e) => {
    if (e.key !== 'Escape') return;
    if (!modalWrap.hidden) closeModal();
    else if (selected) clearSelection();
    else if (mode === 'web') exitWeb();
  });

  window.addEventListener('resize', () => {
    vw = window.innerWidth; vh = window.innerHeight;
    buildStars();
    if (mode === 'web' && !selected) fitGraph();
  });

  $('dataDate').textContent = 'データ時点 ' + D.generated + ' ・ 出典付き' + (D.placeholder ? ' ・ ⚠プレースホルダー' : '');

  // ===== 起動 =====
  buildStars();
  buildLegend();
  requestAnimationFrame(frame);

  // e2e用フック
  window.__APP__ = {
    graph, sim, selectNode, clearSelection, enterWeb, exitWeb,
    state: () => ({ mode, trans, selected: selected && selected.id }),
  };
})();

</script>
</body>
</html>
